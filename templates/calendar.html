<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Calendar - Smart EUG</title>
<link rel="stylesheet" href="/static/style.css">
<style>
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:14px}
.cal-day{aspect-ratio:1;border-radius:10px;padding:6px;display:flex;flex-direction:column;justify-content:space-between;font-size:.7rem;color:#fff;transition:transform .15s}
.cal-day:hover{transform:scale(1.07);z-index:2}
.cal-day.today{box-shadow:0 0 0 3px var(--pink),0 0 16px rgba(236,72,153,0.5)}
.cal-day.MENSTRUAL{background:linear-gradient(135deg,#ef4444,#dc2626)}
.cal-day.FOLLICULAR{background:linear-gradient(135deg,#10b981,#059669)}
.cal-day.OVULATION{background:linear-gradient(135deg,#f59e0b,#d97706)}
.cal-day.LUTEAL{background:linear-gradient(135deg,#8b5cf6,#7c3aed)}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;color:var(--muted);font-size:.7rem;text-transform:uppercase;text-align:center;font-weight:700}
</style>
</head><body>
<div class="card">
  <h3 id="t1">Cycle calendar</h3>
  <div class="card-sub">12 weeks visual map</div>
  <div style="display:grid;grid-template-columns:1fr auto;gap:12px;align-items:end">
    <div class="field"><label>Last period start</label><input type="date" id="lpd"></div>
    <button class="btn" onclick="reload()">${''}</button>
  </div>
  <div class="legend" style="margin-top:8px">
    <span><span class="sw" style="background:#ef4444;display:inline-block;width:14px;height:14px;border-radius:3px"></span>Menstrual</span>
    <span><span class="sw" style="background:#10b981;display:inline-block;width:14px;height:14px;border-radius:3px"></span>Follicular</span>
    <span><span class="sw" style="background:#f59e0b;display:inline-block;width:14px;height:14px;border-radius:3px"></span>Ovulation</span>
    <span><span class="sw" style="background:#8b5cf6;display:inline-block;width:14px;height:14px;border-radius:3px"></span>Luteal</span>
  </div>
  <div class="cal-head"><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div></div>
  <div id="grid" class="cal-grid"></div>
</div>
<script src="/static/widgets.js"></script>
<script>
mountShell('calendar');
document.getElementById('main').insertAdjacentHTML('afterbegin', pageHeader('Cycle calendar', '12-week visual cycle map', 'TRACKING'));
document.getElementById('t1').innerHTML = `${icon('calendar')} Cycle calendar`;
document.querySelector('button.btn').innerHTML = `${icon('refresh')} Update`;
async function reload(){
  const lpd=document.getElementById('lpd').value;if(!lpd) return;
  const r=await fetch('/api/calendar?last_period_date='+lpd+'&weeks=12');const d=await r.json();
  document.getElementById('grid').innerHTML=d.days.map(day=>{const dt=new Date(day.date);return `<div class="cal-day ${day.phase}${day.is_today?' today':''}"><div style="font-weight:700;font-size:.9rem">${dt.getDate()}</div><div style="opacity:.8;font-size:.62rem">D${day.cycle_day}</div></div>`;}).join('');
}
const def=new Date();def.setDate(def.getDate()-5);
document.getElementById('lpd').value=def.toISOString().slice(0,10);reload();
</script>
</body></html>
